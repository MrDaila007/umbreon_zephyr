name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ZEPHYR_VERSION: v4.3.0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Host unit tests (gcc, no Zephyr) ──────────────────────────────────────
  test-host:
    runs-on: [self-hosted, linux, embedded]
    steps:
      - uses: actions/checkout@v4

      - name: Run host unit tests
        working-directory: tests
        run: make test-host

  # ── Firmware build (RP2350) — предустановленный Zephyr workspace на runner ─
  build:
    runs-on: [self-hosted, linux, embedded]
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware
        run: |
          set -euo pipefail
          source "${HOME}/zephyrproject/.venv/bin/activate"
          cd "${HOME}/zephyrproject"
          west build -b rpi_pico2/rp2350a/m33 --pristine always "${GITHUB_WORKSPACE}"
          echo "ZEPHYR_UF2=${HOME}/zephyrproject/build/zephyr/zephyr.uf2" >> "$GITHUB_ENV"

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ${{ env.ZEPHYR_UF2 }}

  # ── Zephyr ztest (native_sim) ─────────────────────────────────────────────
  test-ztest:
    needs: build
    runs-on: [self-hosted, linux, embedded]
    steps:
      - uses: actions/checkout@v4

      - name: Run ztest (native_sim)
        run: |
          set -euo pipefail
          source "${HOME}/zephyrproject/.venv/bin/activate"
          cd "${HOME}/zephyrproject"
          west build -b native_sim -d /tmp/ztest "${GITHUB_WORKSPACE}/tests/ztest"
          /tmp/ztest/zephyr/zephyr.exe
