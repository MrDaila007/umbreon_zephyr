name: Build Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.27.4
    env:
      ZEPHYR_VERSION: v4.3.0
      ZEPHYR_SDK_VERSION: 0.17.0
      ZEPHYR_SDK_INSTALL_DIR: /opt/zephyr-sdk-0.17.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: app

      - name: Cache Zephyr SDK
        uses: actions/cache@v4
        with:
          path: /opt/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}
          key: sdk-${{ env.ZEPHYR_SDK_VERSION }}

      - name: Install Zephyr SDK
        run: |
          if [ ! -d "$ZEPHYR_SDK_INSTALL_DIR" ]; then
            wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${ZEPHYR_SDK_VERSION}/zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64_minimal.tar.xz
            tar xf zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64_minimal.tar.xz -C /opt/
            rm -f zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64_minimal.tar.xz
            cd $ZEPHYR_SDK_INSTALL_DIR
            ./setup.sh -t arm-zephyr-eabi -c
          fi

      - name: Initialize Zephyr workspace
        run: |
          west init -m https://github.com/zephyrproject-rtos/zephyr --mr $ZEPHYR_VERSION zephyrproject
          cd zephyrproject
          west update --narrow -o=--depth=1

      - name: Build firmware
        working-directory: zephyrproject
        run: |
          west build -b rpi_pico2/rp2350a/m33 --pristine always $GITHUB_WORKSPACE/app

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: zephyrproject/build/zephyr/zephyr.uf2
