# ─── Umbreon Zephyr RTOS Configuration ───────────────────────────────────────

# GPIO
CONFIG_GPIO=y

# I2C
CONFIG_I2C=y

# PWM
CONFIG_PWM=y

# ADC
CONFIG_ADC=y

# Sensor subsystem
CONFIG_SENSOR=y

# VL53L0X ToF driver (enhanced, replaces stock)
CONFIG_VL53L0X=n
CONFIG_VL53L0X_ENHANCED=y
CONFIG_VL53L0X_ENHANCED_RECONFIGURE_ADDRESS=y

# MPU-6050 IMU driver
CONFIG_MPU6050=y
CONFIG_MPU6050_TRIGGER_NONE=y

# UART
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# NVS (Non-Volatile Storage)
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Watchdog
CONFIG_WATCHDOG=y

# Console on UART0 (GP16/GP17) — WiFi bridge moved to UART1
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Logging via UART0 console
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_PRINTK=y

# UF2 output for easy flashing
CONFIG_BUILD_OUTPUT_UF2=y

# OLED Display (SSD1306 on I2C0)
CONFIG_DISPLAY=y
CONFIG_SSD1306=y
CONFIG_DISPLAY_INIT_PRIORITY=90
CONFIG_CHARACTER_FRAMEBUFFER=y
CONFIG_CHARACTER_FRAMEBUFFER_USE_DEFAULT_FONTS=y

# Kernel features for display/wifi_cmd
CONFIG_POLL=y
CONFIG_EVENTS=y

# System
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096

# Timers
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

# Newlib for math
CONFIG_NEWLIB_LIBC=y
