# ─── Umbreon Zephyr RTOS Configuration ───────────────────────────────────────

# GPIO
CONFIG_GPIO=y

# I2C
CONFIG_I2C=y

# PWM
CONFIG_PWM=y

# ADC
CONFIG_ADC=y

# Sensor subsystem
CONFIG_SENSOR=y

# VL53L0X ToF driver
CONFIG_VL53L0X=y
CONFIG_VL53L0X_RECONFIGURE_ADDRESS=y

# MPU-6050 IMU driver
CONFIG_MPU6050=y
CONFIG_MPU6050_TRIGGER_NONE=y

# UART
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# NVS (Non-Volatile Storage)
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Watchdog
CONFIG_WATCHDOG=y

# Disable console — UART0 is used for WiFi bridge
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n

# Logging (via RTT or disabled — no UART console)
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y

# UF2 output for easy flashing
CONFIG_BUILD_OUTPUT_UF2=y

# System
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096

# Timers
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

# Newlib for math
CONFIG_NEWLIB_LIBC=y
